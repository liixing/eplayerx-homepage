#:schema node_modules/wrangler/config-schema.json

name = "eplayerx-homepage"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

routes = [
	{ pattern = "api.eplayerx.com", zone_name = "eplayerx.com", custom_domain = true },
	{ pattern = "api2.eplayerx.com", zone_name = "eplayerx.com", custom_domain = true },
	{ pattern = "tmdb.eplayerx.com", zone_name = "eplayerx.com", custom_domain = true },
]

[observability]
enabled = true

# Uncomment to enable cron trigger (e.g. daily crawl at 08:00 UTC)
# [triggers]
# crons = ["0 8 * * *"]
