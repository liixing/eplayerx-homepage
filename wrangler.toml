#:schema node_modules/wrangler/config-schema.json

name = "eplayerx-homepage"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# To use a custom domain instead of *.workers.dev, uncomment and edit:
# workers_dev = false
# preview_urls = false
# routes = [
# 	{ pattern = "api.example.com", zone_name = "example.com", custom_domain = true },
# ]

[observability]
enabled = true

# Uncomment to enable cron trigger (e.g. daily crawl at 08:00 UTC)
# [triggers]
# crons = ["0 8 * * *"]
