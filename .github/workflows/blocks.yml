name: Refresh blocks

# Refresh cadence is folder-based, decided by the admin when placing a script:
#   scripts/blocks/daily/    -> every day
#   scripts/blocks/weekly/   -> every Sunday
#   scripts/blocks/monthly/  -> 1st of each month
#   scripts/blocks/manual/   -> only via workflow_dispatch
on:
  schedule:
    - cron: "0 20 * * *" # daily group
    - cron: "0 21 * * 0" # weekly group (Sunday)
    - cron: "0 22 1 * *" # monthly group (1st)
  workflow_dispatch:
    inputs:
      target:
        description: "daily | weekly | monthly | manual | single script path (e.g. weekly/bahamut-quarterly.ts)"
        required: true
        default: "manual"

concurrency:
  group: blocks-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PUBLIC_TMDB_API_BASE_URL: ${{ vars.PUBLIC_TMDB_API_BASE_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_CUSTOM_DOMAIN: ${{ vars.R2_CUSTOM_DOMAIN }}
      BLOCKS_ADMIN_PASSWORD: ${{ secrets.BLOCKS_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run block scripts
        run: |
          case "${{ github.event_name }}/${{ github.event.schedule }}" in
            workflow_dispatch/*) target="${{ github.event.inputs.target }}" ;;
            */"0 20 * * *") target="daily" ;;
            */"0 21 * * 0") target="weekly" ;;
            *) target="monthly" ;;
          esac
          echo "Target: $target"

          if [[ "$target" == *.ts ]]; then
            bun run "scripts/blocks/$target"
            exit $?
          fi

          shopt -s nullglob
          failed=0
          for f in "scripts/blocks/$target"/*.ts; do
            name="$(basename "$f")"
            [ "$name" = "_template.ts" ] && continue
            echo "▶ $f"
            bun run "$f" || { echo "::warning::$f failed"; failed=1; }
          done
          exit $failed
